<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-675E716Y2L"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-675E716Y2L');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Vote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <span id="user-info" style="margin-left: 20px; color: #888;"></span>
        <button id="login-btn" style="padding: 5px 10px; font-size: 0.9rem;">Login with Google</button>
        <button id="logout-btn" style="display: none; padding: 5px 10px; font-size: 0.9rem; background-color: #d32f2f;">Logout</button>
    </nav>

    <h1>Which is better?</h1>
    
    <div id="loading" style="display: none;">Please log in to start ranking!</div>

    <div class="matchup-container" id="matchup-container" style="display: none;">
        <div class="anime-card" id="card-a">
            <img id="img-a" src="" alt="Anime A">
            <div class="card-content">
                <h2 id="title-a">Anime A</h2>
                <div class="button-group">
                    <button class="primary-btn" onclick="submitVote(1)">Choose This</button>
                    <button class="secondary-btn" onclick="markUnwatched([currentShowA.id])">Haven't seen this</button>
                </div>
            </div>
        </div>

        <div class="anime-card" id="card-b">
            <img id="img-b" src="" alt="Anime B">
            <div class="card-content">
                <h2 id="title-b">Anime B</h2>
                <div class="button-group">
                    <button class="primary-btn" onclick="submitVote(0)">Choose This</button>
                    <button class="secondary-btn" onclick="markUnwatched([currentShowB.id])">Haven't seen this</button>
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <button onclick="submitVote(0.5)"> Tie</button>
        <!-- <button onclick="skipMatch()">Skip (Keep in pool)</button> -->
        <button onclick="markUnwatched([currentShowA.id, currentShowB.id])">Seen Neither</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBffsnhQmA8X_AIrhDF7wW6IYUMDH_szPk",
            authDomain: "show-ranker-project.firebaseapp.com",
            projectId: "show-ranker-project",
            storageBucket: "show-ranker-project.firebasestorage.app",
            messagingSenderId: "10037187822",
            appId: "1:10037187822:web:5e36fbb62dabe0e2ac8fff",
            measurementId: "G-675E716Y2L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // We will store the user's ID globally so our other functions can use it later
        window.currentUserUid = null;

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');
        const loadingDiv = document.getElementById('loading');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Login failed:", error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // This listens for login/logout events
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUserUid = user.uid;
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Guest';
                userInfo.innerText = `Welcome, ${firstName}!`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                
                // Now that they are logged in, fetch the matchup!
                fetchMatchup();
            } else {
                window.currentUserUid = null;
                userInfo.innerText = '';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                
                // Hide game UI
                document.getElementById('matchup-container').style.display = 'none';
                document.getElementById('controls').style.display = 'none';
                loadingDiv.style.display = 'block';
                loadingDiv.innerText = "Please log in to start ranking!";
            }
        });
    </script>

    <script>
        const CLOUD_RUN_URL = 'https://anime-ranker-backend-10037187822.us-central1.run.app/api';
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:8080/api' 
            : CLOUD_RUN_URL;
        let currentShowA = null;
        let currentShowB = null;

        async function fetchMatchup() {
            if (!window.currentUserUid) return; 

            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "Loading matchup...";
            document.getElementById('matchup-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';

            try {
                // ADDED: ?uid= parameter
                const response = await fetch(`${API_BASE}/matchup?uid=${window.currentUserUid}`);
                const data = await response.json();
                
                currentShowA = data.show_a;
                currentShowB = data.show_b;

                document.getElementById('title-a').innerText = currentShowA.title;
                document.getElementById('img-a').src = `images/${currentShowA.id}.webp`;
                
                document.getElementById('title-b').innerText = currentShowB.title;
                document.getElementById('img-b').src = `images/${currentShowB.id}.webp`;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('matchup-container').style.display = 'flex';
                document.getElementById('controls').style.display = 'block';
            } catch (error) {
                console.error("Error fetching matchup:", error);
            }
        }

        async function submitVote(outcome) {
            if (!window.currentUserUid) return;

            document.getElementById('matchup-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "Saving vote...";

            try {
                await fetch(`${API_BASE}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: window.currentUserUid, // ADDED: Passing the user ID
                        anime_a_id: currentShowA.id,
                        anime_b_id: currentShowB.id,
                        outcome: outcome
                    })
                });
                fetchMatchup(); 
            } catch (error) {
                console.error("Error saving vote:", error);
            }
        }

        async function markUnwatched(animeIds) {
            if (!window.currentUserUid) return;

            // Hide UI while loading
            document.getElementById('matchup-container').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "Removing unwatched shows...";

            try {
                await fetch(`${API_BASE}/ignore`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: window.currentUserUid,
                        anime_ids: animeIds // We pass the array of IDs here
                    })
                });
                
                // Fetch a new matchup immediately
                fetchMatchup(); 
            } catch (error) {
                console.error("Error ignoring shows:", error);
                document.getElementById('loading').innerText = "Error! Please refresh.";
            }
        }

        function skipMatch() {
            fetchMatchup();
        }
    </script>
</body>
</html>
