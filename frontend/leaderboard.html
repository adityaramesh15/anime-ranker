<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-675E716Y2L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-675E716Y2L');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Leaderboard</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <button id="login-btn">Login with Google</button>
        <a href="account.html" id="profile-link" style="display: none; margin-left: 15px; vertical-align: middle;">
            <img id="profile-pic" src="" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color); object-fit: cover;">
        </a>
    </nav>

    <h1>Leaderboards</h1>
    
    <div id="auth-warning" class="auth-warning-box">Please log in!</div>

    <div class="page-container">
        <div id="leaderboard-content" style="display: none;">
            <div class="controls-wrapper">
                <div class="controls">
                    <button onclick="showList('personal')" id="btn-personal" class="active-toggle">My Rankings</button>
                    <button onclick="showList('global')" id="btn-global">Global Rankings</button>
                    <button onclick="exportTop10()" id="btn-export" class="export-btn">Copy Top 10</button>
                </div>
            </div>

            <div id="loading">Fetching live scores...</div>
            
            <ol class="leaderboard-list" id="leaderboard-list"></ol>
        </div>
    </div>

    <script type="module">
        import { initAuth } from './js/auth.js';
        import { API_BASE } from './js/api.js';

        let globalData = [];
        let personalData = [];

        initAuth(
            (user) => {
                document.getElementById('auth-warning').style.display = 'none';
                document.getElementById('leaderboard-content').style.display = 'block';
                window.fetchLeaderboards(user.uid);
            },
            () => {
                document.getElementById('auth-warning').style.display = 'block';
                document.getElementById('leaderboard-content').style.display = 'none';
            }
        );

        window.fetchLeaderboards = async function(uid) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('leaderboard-list').innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/leaderboard?uid=${uid}`);
                const data = await response.json();
                
                globalData = data.global;
                personalData = data.personal;

                document.getElementById('loading').style.display = 'none';
                window.showList('personal'); // Default to showing personal
            } catch (error) {
                console.error("Error fetching leaderboard:", error);
                document.getElementById('loading').innerText = "Error loading data.";
            }
        };

        window.showList = function(type) {
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = ''; // Clear current list
            
            const dataToShow = type === 'personal' ? personalData : globalData;

            // Update button styles using the CSS class
            document.getElementById('btn-personal').classList.toggle('active-toggle', type === 'personal');
            document.getElementById('btn-global').classList.toggle('active-toggle', type === 'global');
            
            // Hide export button when viewing Global Rankings
            document.getElementById('btn-export').style.display = type === 'personal' ? 'inline-flex' : 'none';

            dataToShow.forEach((anime, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.style.animationDelay = `${index * 0.04}s`;
                
                const isUnrankedGlobal = type === 'global' && (anime.matches_played === 0 || anime.matches_played === undefined);
                if (isUnrankedGlobal) {
                    li.classList.add('unranked-item');
                }

                li.innerHTML = `
                    <span class="rank">${isUnrankedGlobal ? '—' : '#' + (index + 1)}</span>
                    <img src="images/${anime.id}.webp" alt="${anime.title}">
                    <span class="title">${anime.title} ${isUnrankedGlobal ? '<span class="unranked-badge">Unranked</span>' : ''}</span>
                    <span class="score">${isUnrankedGlobal ? '—' : anime.elo_score + ' Elo'}</span>
                `;
                listEl.appendChild(li);
            });
        };

        window.exportTop10 = async function() {
            if (!personalData || personalData.length === 0) {
                alert("You don't have any ranked shows yet!");
                return;
            }

            const top10 = personalData.slice(0, 10);
            
            let formattedText = "🏆 My Top 10 Anime 🏆\n\n";
            top10.forEach((anime, index) => {
                formattedText += `${index + 1}. ${anime.title} (${anime.elo_score} Elo)\n`;
            });

            try {
                await navigator.clipboard.writeText(formattedText);
                const btn = document.getElementById('btn-export');
                const originalText = btn.innerHTML;
                btn.innerHTML = "Copied!";
                setTimeout(() => { btn.innerHTML = originalText; }, 2000); 
                
            } catch (err) {
                console.error("Failed to copy text: ", err);
                alert("Clipboard copy failed. Please try again.");
            }
        };
    </script>
</body>
</html>
