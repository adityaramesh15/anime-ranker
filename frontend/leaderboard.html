<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-675E716Y2L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-675E716Y2L');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Leaderboard</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <span id="user-info"></span>
        <button id="login-btn">Login with Google</button>
        <button id="logout-btn" style="display: none;">Logout</button>
    </nav>

    <div class="page-container">
        <h1>Leaderboards</h1>
        
        <div id="auth-warning" class="auth-warning-box">Please log in to view leaderboards!</div>

        <div id="leaderboard-content" style="display: none;">
            <div class="controls-wrapper">
                <div class="controls">
                    <button onclick="showList('personal')" id="btn-personal" class="active-toggle">My Rankings</button>
                    <button onclick="showList('global')" id="btn-global">Global Rankings</button>
                    <button onclick="exportTop10()" id="btn-export" class="export-btn">Copy Top 10</button>
                </div>
            </div>

            <div id="loading">Fetching live scores...</div>
            
            <ol class="leaderboard-list" id="leaderboard-list"></ol>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBffsnhQmA8X_AIrhDF7wW6IYUMDH_szPk",
            authDomain: "show-ranker-project.firebaseapp.com",
            projectId: "show-ranker-project",
            storageBucket: "show-ranker-project.firebasestorage.app",
            messagingSenderId: "10037187822",
            appId: "1:10037187822:web:5e36fbb62dabe0e2ac8fff",
            measurementId: "G-675E716Y2L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Login failed:", error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Update UI
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Guest';
                userInfo.innerText = `Welcome, ${firstName}!`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                
                // Show leaderboard
                document.getElementById('auth-warning').style.display = 'none';
                document.getElementById('leaderboard-content').style.display = 'block';
                fetchLeaderboards(user.uid);
            } else {
                // Revert UI
                userInfo.innerText = '';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                
                // Hide leaderboard
                document.getElementById('auth-warning').style.display = 'block';
                document.getElementById('leaderboard-content').style.display = 'none';
            }
        });
    </script>

    <script>
        const CLOUD_RUN_URL = 'https://anime-ranker-backend-10037187822.us-central1.run.app/api';
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:8080/api' 
            : CLOUD_RUN_URL;
        let globalData = [];
        let personalData = [];

        async function fetchLeaderboards(uid) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('leaderboard-list').innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/leaderboard?uid=${uid}`);
                const data = await response.json();
                
                globalData = data.global;
                personalData = data.personal;

                document.getElementById('loading').style.display = 'none';
                showList('personal'); // Default to showing personal
            } catch (error) {
                console.error("Error fetching leaderboard:", error);
                document.getElementById('loading').innerText = "Error loading data.";
            }
        }

        function showList(type) {
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = ''; // Clear current list
            
            const dataToShow = type === 'personal' ? personalData : globalData;

            // Update button styles using the CSS class
            document.getElementById('btn-personal').classList.toggle('active-toggle', type === 'personal');
            document.getElementById('btn-global').classList.toggle('active-toggle', type === 'global');
            
            // Hide export button when viewing Global Rankings
            document.getElementById('btn-export').style.display = type === 'personal' ? 'inline-flex' : 'none';

            dataToShow.forEach((anime, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.style.animationDelay = `${index * 0.04}s`;
                
                const isUnrankedGlobal = type === 'global' && (anime.matches_played === 0 || anime.matches_played === undefined);
                if (isUnrankedGlobal) {
                    li.classList.add('unranked-item');
                }

                li.innerHTML = `
                    <span class="rank">${isUnrankedGlobal ? '—' : '#' + (index + 1)}</span>
                    <img src="images/${anime.id}.webp" alt="${anime.title}">
                    <span class="title">${anime.title} ${isUnrankedGlobal ? '<span class="unranked-badge">Unranked</span>' : ''}</span>
                    <span class="score">${isUnrankedGlobal ? '—' : anime.elo_score + ' Elo'}</span>
                `;
                listEl.appendChild(li);
            });
        }

        async function exportTop10() {
            if (!personalData || personalData.length === 0) {
                alert("You don't have any ranked shows yet!");
                return;
            }

            const top10 = personalData.slice(0, 10);
            
            let formattedText = "🏆 My Top 10 Anime 🏆\n\n";
            top10.forEach((anime, index) => {
                formattedText += `${index + 1}. ${anime.title} (${anime.elo_score} Elo)\n`;
            });

            try {
                await navigator.clipboard.writeText(formattedText);
                const btn = document.getElementById('btn-export');
                const originalText = btn.innerHTML;
                btn.innerHTML = "Copied!";
                setTimeout(() => { btn.innerHTML = originalText; }, 2000); 
                
            } catch (err) {
                console.error("Failed to copy text: ", err);
                alert("Clipboard copy failed. Please try again.");
            }
        }
    </script>
</body>
</html>
