<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <span id="user-info" style="margin-left: 20px; color: #888;"></span>
        <button id="login-btn" style="padding: 5px 10px; font-size: 0.9rem;">Login with Google</button>
        <button id="logout-btn" style="display: none; padding: 5px 10px; font-size: 0.9rem; background-color: #d32f2f;">Logout</button>
    </nav>

    <h1>Leaderboards</h1>
    
    <div id="auth-warning">Please log in on the Matchup page to view your leaderboards.</div>

    <div id="leaderboard-content" style="display: none;">
        <div class="controls" style="margin-bottom: 20px;">
            <button onclick="showList('personal')" id="btn-personal" style="background-color: var(--hover-color);">My Rankings</button>
            <button onclick="showList('global')" id="btn-global">Global Rankings</button>
        </div>

        <div id="loading">Fetching live scores...</div>
        
        <ol class="leaderboard-list" id="leaderboard-list">
            </ol>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBffsnhQmA8X_AIrhDF7wW6IYUMDH_szPk",
            authDomain: "show-ranker-project.firebaseapp.com",
            projectId: "show-ranker-project",
            storageBucket: "show-ranker-project.firebasestorage.app",
            messagingSenderId: "10037187822",
            appId: "1:10037187822:web:5e36fbb62dabe0e2ac8fff",
            measurementId: "G-675E716Y2L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Login failed:", error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Update UI
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Guest';
                userInfo.innerText = `Welcome, ${firstName}!`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                
                // Show leaderboard
                document.getElementById('auth-warning').style.display = 'none';
                document.getElementById('leaderboard-content').style.display = 'block';
                fetchLeaderboards(user.uid);
            } else {
                // Revert UI
                userInfo.innerText = '';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                
                // Hide leaderboard
                document.getElementById('auth-warning').style.display = 'block';
                document.getElementById('leaderboard-content').style.display = 'none';
            }
        });
    </script>

    <script>
        const CLOUD_RUN_URL = 'https://anime-ranker-backend-10037187822.us-central1.run.app/api';
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:8080/api' 
            : CLOUD_RUN_URL;
        let globalData = [];
        let personalData = [];

        async function fetchLeaderboards(uid) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('leaderboard-list').innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/leaderboard?uid=${uid}`);
                const data = await response.json();
                
                globalData = data.global;
                personalData = data.personal;

                document.getElementById('loading').style.display = 'none';
                
                // Default to showing personal
                showList('personal');
            } catch (error) {
                console.error("Error fetching leaderboard:", error);
                document.getElementById('loading').innerText = "Error loading data.";
            }
        }

        function showList(type) {
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = ''; // Clear current list
            
            const dataToShow = type === 'personal' ? personalData : globalData;

            // Update button styles to show which is active
            document.getElementById('btn-personal').style.backgroundColor = type === 'personal' ? 'var(--hover-color)' : 'var(--primary-color)';
            document.getElementById('btn-global').style.backgroundColor = type === 'global' ? 'var(--hover-color)' : 'var(--primary-color)';

            dataToShow.forEach((anime, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.innerHTML = `
                    <span class="rank">#${index + 1}</span>
                    <img src="images/${anime.id}.jpg" alt="${anime.title}">
                    <span class="title">${anime.title}</span>
                    <span class="score">${anime.elo_score} Elo</span>
                `;
                listEl.appendChild(li);
            });
        }
    </script>
</body>
</html>
