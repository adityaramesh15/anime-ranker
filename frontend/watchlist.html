<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
    window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Watchlist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            padding: 0 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .watchlist-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, opacity 0.4s;
        }

        .watchlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .watchlist-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 14px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s ease;
        }

        .watchlist-card:hover img {
            transform: scale(1.03);
        }

        .watchlist-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0 0 14px 0;
            flex-grow: 1;
            line-height: 1.35;
            color: var(--text-color);
        }

        .watchlist-card .add-back-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 0.9rem;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .watchlist-card .add-back-btn:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.35);
        }

        .watchlist-card .add-back-btn:active {
            transform: translateY(1px);
        }

        .watchlist-card.removing {
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            pointer-events: none;
        }

        .empty-state {
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 36px;
            font-size: 1.05rem;
        }

        .show-count {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .show-count span {
            color: #a5b4fc;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <span id="user-info" style="margin-left: 20px; color: #888;"></span>
        <button id="login-btn" style="padding: 5px 10px; font-size: 0.9rem;">Login with Google</button>
        <button id="logout-btn" style="display: none; padding: 5px 10px; font-size: 0.9rem; background-color: #d32f2f;">Logout</button>
    </nav>

    <h1>My Watchlist</h1>
    <p class="subtitle">Shows you marked as unwatched. Add them back to your ranking pool once you've seen them!</p>

    <div id="auth-warning">Please log in to view your watchlist.</div>
    <div id="loading" style="display: none;">Fetching watchlist...</div>
    <div id="show-count" class="show-count" style="display: none;"></div>
    
    <div class="watchlist-grid" id="watchlist-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBffsnhQmA8X_AIrhDF7wW6IYUMDH_szPk",
            authDomain: "show-ranker-project.firebaseapp.com",
            projectId: "show-ranker-project",
            storageBucket: "show-ranker-project.firebasestorage.app",
            messagingSenderId: "10037187822",
            appId: "1:10037187822:web:5e36fbb62dabe0e2ac8fff",
            measurementId: "G-675E716Y2L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userInfo = document.getElementById('user-info');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Login failed:", error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUserUid = user.uid;
                const firstName = user.displayName ? user.displayName.split(' ')[0] : 'Guest';
                userInfo.innerText = `Welcome, ${firstName}!`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                document.getElementById('auth-warning').style.display = 'none';
                fetchWatchlist();
            } else {
                window.currentUserUid = null;
                userInfo.innerText = '';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                document.getElementById('auth-warning').style.display = 'block';
                document.getElementById('watchlist-grid').innerHTML = '';
                document.getElementById('show-count').style.display = 'none';
            }
        });
    </script>

    <script>
        const CLOUD_RUN_URL = 'https://anime-ranker-backend-10037187822.us-central1.run.app/api';
        const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
            ? 'http://127.0.0.1:8080/api' 
            : CLOUD_RUN_URL;

        let watchlistCount = 0;

        async function fetchWatchlist() {
            if (!window.currentUserUid) return;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('show-count').style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/watchlist?uid=${window.currentUserUid}`);
                const data = await response.json();
                
                const grid = document.getElementById('watchlist-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                watchlistCount = data.length;

                if (data.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <span class="empty-icon">🎉</span>
                            <p>Your watchlist is empty!</p>
                            <p>Shows you mark as "Haven't seen this" during matchups will appear here.</p>
                        </div>
                    `;
                    return;
                }

                updateShowCount();

                data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'watchlist-card';
                    card.id = `card-${anime.id}`;
                    card.innerHTML = `
                        <img src="images/${anime.id}.webp" alt="${anime.title}">
                        <h3>${anime.title}</h3>
                        <button class="add-back-btn" onclick="unignoreAnime(${anime.id})">I've watched it!</button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching watchlist:", error);
                document.getElementById('loading').innerText = "Error loading watchlist.";
            }
        }

        function updateShowCount() {
            const countEl = document.getElementById('show-count');
            countEl.style.display = 'block';
            countEl.innerHTML = `<span>${watchlistCount}</span> show${watchlistCount !== 1 ? 's' : ''} on your watchlist`;
        }

        async function unignoreAnime(animeId) {
            if (!window.currentUserUid) return;
            
            // Animate out, then remove
            const card = document.getElementById(`card-${animeId}`);
            if (card) {
                card.classList.add('removing');
            }

            watchlistCount--;

            // Wait for animation, then remove from DOM
            setTimeout(() => {
                if (card) card.remove();

                // Check if grid is now empty
                const grid = document.getElementById('watchlist-grid');
                if (grid.children.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <span class="empty-icon">🎉</span>
                            <p>Your watchlist is empty!</p>
                            <p>Shows you mark as "Haven't seen this" during matchups will appear here.</p>
                        </div>
                    `;
                    document.getElementById('show-count').style.display = 'none';
                } else {
                    updateShowCount();
                }
            }, 400);

            try {
                await fetch(`${API_BASE}/unignore`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: window.currentUserUid, anime_id: animeId })
                });
            } catch (error) {
                console.error("Error un-ignoring:", error);
                alert("Failed to move back to pool. Please refresh.");
                fetchWatchlist(); // Re-fetch to restore correct state
            }
        }
    </script>
</body>
</html>
