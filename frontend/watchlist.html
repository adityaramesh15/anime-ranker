<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-675E716Y2L"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-675E716Y2L');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Ranker - Watchlist</title>
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            padding: 0 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .watchlist-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, opacity 0.4s;
        }

        .watchlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .watchlist-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 14px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s ease;
        }

        .watchlist-card:hover img {
            transform: scale(1.03);
        }

        .watchlist-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0 0 14px 0;
            flex-grow: 1;
            line-height: 1.35;
            color: var(--text-color);
        }

        .watchlist-card .add-back-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 0.9rem;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .watchlist-card .add-back-btn:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.35);
        }

        .watchlist-card .add-back-btn:active {
            transform: translateY(1px);
        }

        .watchlist-card .favorite-toggle-btn {
            display: block;
            margin: 8px auto 0;
            padding: 6px 10px;
            font-size: 0.75rem;
            border-radius: 999px;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.45);
            box-shadow: none;
            min-width: 92px;
        }

        .watchlist-card .favorite-toggle-btn:hover {
            background: rgba(239, 68, 68, 0.28);
            color: #fecaca;
            border-color: rgba(248, 113, 113, 0.65);
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(239, 68, 68, 0.25);
        }

        .watchlist-card .favorite-toggle-btn.active {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }

        .watchlist-card.removing {
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            pointer-events: none;
        }

        .empty-state {
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            display: block;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 36px;
            font-size: 1.05rem;
        }

        .show-count {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .show-count span {
            color: #a5b4fc;
            font-weight: 600;
        }

        .anilist-link {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .anilist-link:hover {
            color: #a5b4fc; 
        }

        @media (max-width: 680px) {
            .watchlist-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 0 8px;
                max-width: 640px;
            }

            .watchlist-card {
                border-radius: 12px;
                padding: 10px;
                display: grid;
                grid-template-columns: 72px minmax(0, 1fr);
                column-gap: 10px;
                row-gap: 8px;
                align-items: start;
                text-align: left;
            }

            .watchlist-card img {
                grid-row: 1 / 4;
                width: 72px;
                height: 104px;
                margin: 0;
                border-radius: 8px;
            }

            .watchlist-card h3 {
                margin: 0;
                font-size: 0.95rem;
                line-height: 1.35;
            }

            .watchlist-card .add-back-btn,
            .watchlist-card .favorite-toggle-btn {
                width: 100%;
                margin: 0;
                font-size: 0.82rem;
                padding: 8px 10px;
                border-radius: 8px;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Matchup</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="watchlist.html">Watchlist</a>
        
        <button id="login-btn" style="padding: 5px 10px; font-size: 0.9rem;">Login with Google</button>
        <a href="account.html" id="profile-link" style="display: none; margin-left: 15px; vertical-align: middle;">
            <img id="profile-pic" referrerpolicy="no-referrer" src="" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--primary-color); object-fit: cover;">
        </a>
    </nav>

    <h1>My Watchlist</h1>
    <div id="auth-warning" class="auth-warning-box">Please log in!</div>
    <div id="loading" style="display: none;">Fetching watchlist...</div>
    
    <div class="controls-wrapper" id="watchlist-controls" style="display: none; max-width: 1100px; margin: 0 auto 20px auto; padding: 0 20px; justify-content: center; align-items: center; flex-direction: column; gap: 10px;">
        <div id="show-count" class="show-count" style="margin: 0; text-align: center;"></div>
        <div class="controls">
            <button id="filter-favorites-btn" class="secondary-btn" onclick="toggleFavoritesFilter()" style="margin-right: 10px;">Show All</button>
            <button id="sort-toggle-btn" class="secondary-btn" onclick="toggleSortMode()">Sort: Alphabetical</button>
        </div>
    </div>
    
    <div class="watchlist-grid" id="watchlist-grid"></div>

    <script type="module">
        import { initAuth } from './js/auth.js';
        import { API_BASE } from './js/api.js';

        let watchlistData = [];
        let favoritesOnly = false;
        let sortMode = 'alpha';

        initAuth(
            (user) => {
                window.fetchWatchlist();
            },
            () => {
                document.getElementById('watchlist-grid').innerHTML = '';
                document.getElementById('watchlist-controls').style.display = 'none';
            }
        );

        window.fetchWatchlist = async function() {
            if (!window.currentUserUid) return;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('watchlist-controls').style.display = 'none';
            document.getElementById('watchlist-grid').innerHTML = '';

            const cacheKey = `watchlist_${window.currentUserUid}`;
            const cachedData = localStorage.getItem(cacheKey);

            if (cachedData) {
                watchlistData = JSON.parse(cachedData);
                document.getElementById('loading').style.display = 'none';
                window.applySortAndFilter();
            } else {
                try {
                    const response = await fetch(`${API_BASE}/watchlist?uid=${window.currentUserUid}`);
                    watchlistData = await response.json();
                    localStorage.setItem(cacheKey, JSON.stringify(watchlistData));
                    
                    document.getElementById('loading').style.display = 'none';
                    window.applySortAndFilter();
                } catch (error) {
                    console.error("Error fetching watchlist:", error);
                    document.getElementById('loading').innerText = "Error loading watchlist.";
                }
            }
        };

        window.applySortAndFilter = function() {
            let filteredData = [...watchlistData];
            
            if (favoritesOnly) {
                filteredData = filteredData.filter(anime => anime.favorite);
            }

            if (sortMode === 'global_elo') {
                filteredData.sort((a, b) => b.global_elo - a.global_elo);
            } else {
                filteredData.sort((a, b) => a.title.localeCompare(b.title));
            }

            window.renderGrid(filteredData);
        };

        window.renderGrid = function(data) {
            const grid = document.getElementById('watchlist-grid');
            grid.innerHTML = '';
            
            if (watchlistData.length === 0) {
                document.getElementById('watchlist-controls').style.display = 'none';
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <span class="empty-icon">🎉</span>
                        <p>Your watchlist is empty!</p>
                        <p>Shows you mark as "Haven't seen this" during matchups will appear here.</p>
                    </div>
                `;
                return;
            }

            document.getElementById('watchlist-controls').style.display = 'flex';
            
            const countEl = document.getElementById('show-count');
            countEl.innerHTML = `<span>${data.length}</span> show${data.length !== 1 ? 's' : ''}`;

            if (data.length === 0 && favoritesOnly) {
                 grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <p>No favorites found!</p>
                    </div>
                `;
                return;
            }

            data.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'watchlist-card';
                card.id = `card-${anime.id}`;
                const favoriteClass = anime.favorite ? 'active' : '';
                const favoriteLabel = anime.favorite ? 'Favorited' : 'Favorite';

                card.innerHTML = `
                    <img src="images/${anime.id}.webp" alt="${anime.title}">
                    <h3><a href="https://anilist.co/anime/${anime.id}" target="_blank" class="anilist-link">${anime.title}</a></h3>
                    <button class="add-back-btn" onclick="unignoreAnime(${anime.id})">I've watched it!</button>
                    <button class="favorite-toggle-btn ${favoriteClass}" onclick="toggleFavorite(${anime.id}, ${!anime.favorite})">${favoriteLabel}</button>
                `;
                grid.appendChild(card);
            });
        };

        window.toggleFavoritesFilter = function() {
            favoritesOnly = !favoritesOnly;
            const btn = document.getElementById('filter-favorites-btn');
            btn.innerText = favoritesOnly ? "Favorites Only" : "Show All";
            btn.classList.toggle('active-toggle', favoritesOnly);
            window.applySortAndFilter();
        };

        window.toggleSortMode = function() {
            sortMode = sortMode === 'alpha' ? 'global_elo' : 'alpha';
            const btn = document.getElementById('sort-toggle-btn');
            btn.innerText = sortMode === 'global_elo' ? "Sort: Global Elo Rank" : "Sort: Alphabetical";
            btn.classList.toggle('active-toggle', sortMode === 'global_elo');
            window.applySortAndFilter();
        };

        window.toggleFavorite = async function(animeId, newStatus) {
            if (!window.currentUserUid) return;

            const anime = watchlistData.find(a => a.id === animeId);
            if (anime) anime.favorite = newStatus;

            const cacheKey = `watchlist_${window.currentUserUid}`;
            localStorage.setItem(cacheKey, JSON.stringify(watchlistData));

            window.applySortAndFilter();

            try {
                await fetch(`${API_BASE}/favorite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: window.currentUserUid,
                        anime_id: animeId,
                        favorite: newStatus
                    })
                });
            } catch (error) {
                console.error("Error toggling favorite:", error);
            }
        };

        window.unignoreAnime = async function(animeId) {
            if (!window.currentUserUid) return;
            
            const card = document.getElementById(`card-${animeId}`);
            if (card) card.classList.add('removing');

            watchlistData = watchlistData.filter(a => a.id !== animeId);
            
            const cacheKey = `watchlist_${window.currentUserUid}`;
            localStorage.setItem(cacheKey, JSON.stringify(watchlistData));

            setTimeout(() => {
                window.applySortAndFilter();
            }, 400);

            try {
                await fetch(`${API_BASE}/unignore`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uid: window.currentUserUid, anime_id: animeId })
                });
            } catch (error) {
                console.error("Error un-ignoring:", error);
                localStorage.removeItem(cacheKey); // Wipe cache if error
            }
        };
    </script>
</body>
</html>
